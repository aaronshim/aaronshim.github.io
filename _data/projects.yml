- title: Overtones
  icons: [elm, javascript, webpack]
  description: Overtones is a javascript-based synthesizer for creating new tonal colors through <a href="https://en.wikipedia.org/wiki/Additive_synthesis">additive synthesis</a> (stacking different overtones on top of each other). It was built on top of the Web Audio API using Elm.
  link: //shim.space/overtones
